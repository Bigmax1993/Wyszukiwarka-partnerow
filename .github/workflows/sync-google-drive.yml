name: Sync wyniki Google Drive

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 5"
  workflow_run:
    workflows: ["GU piatek send"]
    types: [completed]

env:
  GDRIVE_FOLDER_ID: "1tP8oUi72t4EHDbE9GnHFdvfNtNsJe4xf"
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt -r requirements-drive.txt

      - name: Download artifacts (piatek)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: de-gu-wyniki-fri
          path: .

      - name: Validate GDRIVE secret (JSON konta uslugowego)
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          python -c "
          import os, json, sys
          raw = (os.environ.get('GDRIVE_SERVICE_ACCOUNT_JSON') or '').strip()
          if not raw:
              print('PUSTY secret GDRIVE_SERVICE_ACCOUNT_JSON')
              sys.exit(1)
          if raw.startswith('AIza'):
              print('BLAD: wklejony klucz API (AIza...), nie plik JSON konta uslugowego')
              sys.exit(1)
          try:
              j = json.loads(raw)
          except json.JSONDecodeError as e:
              print('BLAD: niepoprawny JSON:', e)
              sys.exit(1)
          if j.get('type') != 'service_account' or not j.get('client_email'):
              print('BLAD: brak type=service_account lub client_email')
              sys.exit(1)
          print('OK:', j['client_email'])
          "

      - name: Upload Wyniki to Google Drive
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p Wyniki wyslane 2>/dev/null || true
          python scripts/gdrive_upload_wyniki.py --campaign-dir .
