name: GU wtorek send

# Harmonogram GHA aktywny tylko 14.07–21.07.2026 (Europe/Warsaw); poza tym oknem — lokalnie.
on:
  schedule:
    - cron: "0 9 * * 2"
      timezone: Europe/Warsaw
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: "Opcjonalnie run ID zrodla cache. Puste = najnowszy artefakt pipeline."
        required: false
        type: string
      artifact_name:
        description: "Nazwa artefaktu (np. de-gu-wyniki-pi). Puste = auto (najnowszy)."
        required: false
        type: string
      force_resend:
        description: Ponowna wysylka (ignoruj suppression i sent)
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

concurrency:
  group: gu-pipeline
  cancel-in-progress: false

env:
  SCRAPER_TIMEZONE: Europe/Berlin
  DISABLE_SEND_WINDOW: "1"
  MFG_EMAIL_ATTACHMENT_PATH: ${{ github.workspace }}/assets/campaign/MFG_Referenzliste_Einzelhandel.pptx
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs
  SMTP_HOST: ragakomputer.home.pl
  SMTP_PORT: "465"
  SMTP_SSL: "1"
  IMAP_HOST: ragakomputer.home.pl
  IMAP_PORT: "993"
  IMAP_SSL: "1"
  MAIL_ARCHIVE_IMAP: "1"

jobs:
  send:
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'schedule' &&
           github.run_started_at >= '2026-07-13T22:00:00Z' &&
           github.run_started_at < '2026-07-21T22:00:00Z') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-scraper

      - name: Resolve artifact run (najnowszy cache pipeline)
        id: artifact_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FORCED_RUN="${{ github.event_name == 'workflow_dispatch' && inputs.artifact_run_id || '' }}"
          FORCED_NAME="${{ github.event_name == 'workflow_dispatch' && inputs.artifact_name || '' }}"

          if [ -n "$FORCED_RUN" ]; then
            echo "run-id=$FORCED_RUN" >> "$GITHUB_OUTPUT"
            echo "artifact=${FORCED_NAME:-de-gu-wyniki-pi}" >> "$GITHUB_OUTPUT"
            echo "Pobieram ${FORCED_NAME:-de-gu-wyniki-pi} z run $FORCED_RUN (wymuszone)"
            exit 0
          fi

          ALL=$(gh api "repos/${{ github.repository }}/actions/artifacts" \
            --paginate --jq '.artifacts[] | select(.expired==false)')

          if [ -n "$FORCED_NAME" ]; then
            PICK=$(echo "$ALL" | jq -s --arg n "$FORCED_NAME" \
              '[.[] | select(.name == $n)] | sort_by(.created_at) | reverse | .[0] // empty')
          else
            PICK=$(echo "$ALL" | jq -s \
              '[.[] | select(.name | test("^de-gu-wyniki-(thu|wed|mon|tue|fri|pi)$"))] | sort_by(.created_at) | reverse | .[0] // empty')
          fi

          if [ -z "$PICK" ] || [ "$PICK" = "null" ]; then
            echo "::error::Brak artefaktu pipeline (thu/mon/tue/fri/pi) — uruchom discovery lub backfill"
            exit 1
          fi

          ARTIFACT=$(echo "$PICK" | jq -r '.name')
          RUN_ID=$(echo "$PICK" | jq -r '.workflow_run.id')
          CREATED=$(echo "$PICK" | jq -r '.created_at')
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "artifact=$ARTIFACT" >> "$GITHUB_OUTPUT"
          echo "Pobieram $ARTIFACT z run $RUN_ID ($CREATED)"

      - name: Download cache from zrodla
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.artifact_run.outputs.artifact }}
          github-token: ${{ github.token }}
          run-id: ${{ steps.artifact_run.outputs.run-id }}
          path: .

      - name: "Pobierz aktualny PPTX ze Slides (fallback bundled)"
        env:
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
        run: |
          pip install -r requirements-drive.txt
          if python scripts/export_mfg_slides_attachment.py; then
            echo "OK: PPTX ze Slides"
          else
            echo "UWAGA: Slides niedostepne (OAuth) - uzywam PPTX z repo"
          fi
          test -f assets/campaign/MFG_Referenzliste_Einzelhandel.pptx

      - name: Send emails partia 2 (niewyslane z cache, do 300/dzien)
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          ARGS="--send-emails-only --ignore-send-window"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_resend }}" = "true" ]; then
            ARGS="$ARGS --force-resend"
          fi
          python de_gu_bauunternehmen_scraper.py $ARGS

      - name: Upload Wyniki artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-fri
          path: |
            Wyniki/
            wyslane/
