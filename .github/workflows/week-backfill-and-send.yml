name: GU tydzien backfill i wysylka

on:
  workflow_dispatch:
    inputs:
      pi_run_ids:
        description: "Run ID de-gu-wyniki-pi (po przecinku)"
        required: false
        default: "27533750486,27638016924,27713619204,27787280147,27837533068"
      week_label:
        description: "Etykieta tygodnia"
        required: false
        default: "2026-06-15_2026-06-21"
      prior_send_run_id:
        description: "Run ID ostatniej wysylki (de-gu-wyniki-tue). Puste = najnowszy tue."
        required: false
        default: "27933438260"
      skip_verify:
        description: "Pomin weryfikacje WWW (szybciej, gorsze e-maile)"
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

env:
  SCRAPER_TIMEZONE: Europe/Berlin
  DISABLE_SEND_WINDOW: "1"
  MFG_EMAIL_ATTACHMENT_PATH: ${{ github.workspace }}/assets/campaign/MFG_Referenzliste_Einzelhandel.pptx
  KANBUD_PROJECT_ROOT: ${{ github.workspace }}/libs
  SMTP_HOST: ragakomputer.home.pl
  SMTP_PORT: "465"
  SMTP_SSL: "1"
  IMAP_HOST: ragakomputer.home.pl
  IMAP_PORT: "993"
  IMAP_SSL: "1"
  MAIL_ARCHIVE_IMAP: "1"
  SERPER_DAILY_LIMIT: "1000"
  CLAUDE_UNLIMITED: "1"

jobs:
  backfill-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Scal discovery z tygodnia (21 firm)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p Wyniki wyslane
          python scripts/export_week_discovery_all_to_excel.py \
            --run-ids "${{ github.event.inputs.pi_run_ids }}" \
            --label "${{ github.event.inputs.week_label }}"

      - name: Pobierz status poprzedniej wysylki (unikaj duplikatow)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRIOR="${{ github.event.inputs.prior_send_run_id }}"
          if [ -z "$PRIOR" ]; then
            PRIOR=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
              --jq '[.artifacts[] | select(.name=="de-gu-wyniki-tue" and .expired==false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id // empty')
          fi
          if [ -z "$PRIOR" ] || [ "$PRIOR" = "null" ]; then
            echo "Brak artefaktu tue — pomijam merge sent"
            exit 0
          fi
          mkdir -p /tmp/prior-send
          gh run download "$PRIOR" -R "${{ github.repository }}" -n de-gu-wyniki-tue -D /tmp/prior-send
          python scripts/apply_prior_send_state.py \
            --prior-cache /tmp/prior-send/Wyniki/de_gu_bauunternehmen_cache.json

      - name: Verify + backfill e-maili + rebuild Excel
        if: ${{ github.event.inputs.skip_verify != 'true' }}
        run: |
          CFG="--run-config run_config/mfg_gu_de.json"
          python de_gu_bauunternehmen_scraper.py $CFG --verify-pending-contacts --reverify-all-contacts
          python de_gu_bauunternehmen_scraper.py $CFG --backfill-emails-from-cache
          python de_gu_bauunternehmen_scraper.py $CFG --rebuild-from-cache

      - name: Rebuild Excel (bez verify)
        if: ${{ github.event.inputs.skip_verify == 'true' }}
        run: |
          python de_gu_bauunternehmen_scraper.py --run-config run_config/mfg_gu_de.json --rebuild-from-cache

      - name: Podglad kolejki mailowej
        run: python scripts/analyze_mail_jobs.py

      - name: Pobierz aktualny PPTX ze Slides (fallback: bundled)
        env:
          GDRIVE_OAUTH_CLIENT_ID: ${{ secrets.GDRIVE_OAUTH_CLIENT_ID }}
          GDRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.GDRIVE_OAUTH_CLIENT_SECRET }}
          GDRIVE_OAUTH_REFRESH_TOKEN: ${{ secrets.GDRIVE_OAUTH_REFRESH_TOKEN }}
        run: |
          pip install -r requirements-drive.txt
          if python scripts/export_mfg_slides_attachment.py; then
            echo "OK: PPTX ze Slides"
          else
            echo "UWAGA: Slides niedostepne (OAuth) - uzywam PPTX z repo"
          fi
          test -f assets/campaign/MFG_Referenzliste_Einzelhandel.pptx

      - name: Wysylka maili (partia 1)
        run: |
          python de_gu_bauunternehmen_scraper.py --send-emails-only --ignore-send-window

      - name: Wysylka maili (partia 2)
        run: |
          python de_gu_bauunternehmen_scraper.py --send-emails-only --ignore-send-window

      - name: Podsumowanie po wysylce
        run: python scripts/analyze_mail_jobs.py

      - name: Upload Wyniki artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: de-gu-wyniki-week-send
          path: |
            Wyniki/
            wyslane/
